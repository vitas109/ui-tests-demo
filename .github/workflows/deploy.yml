name: Deploy to GitHub Pages

on:
  push:
    branches: [main, app]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run UI tests
        run: npm run test -- --grep-invert "Скриншот"
        continue-on-error: true

      - name: Run screenshot tests
        run: npm run test -- --grep "Скриншот" --update-snapshots
        continue-on-error: true

      - name: Commit and push screenshots
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add src/tests/screenshot.spec.ts-snapshots/
          git commit -m "chore: update screenshot baselines [skip ci]" || echo "No changes to commit"
          git push
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Allure
        run: npm install -g allure-commandline

      - name: Generate Allure report
        run: |
          mkdir -p dist/allure-report
          allure generate allure-results -o dist/allure-report --clean || true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results
          retention-days: 30
